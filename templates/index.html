<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Você ❤️</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

  <div class="card">
    <p class="message">
      {{ messages[step] }}
    </p>

    {% if step < messages|length - 1 %}
    <form method="POST">
      <input type="hidden" name="step" value="{{ step }}">
      <button type="submit">Continuar ❤️</button>
    </form>
    {% else %}
      <div class="heart"></div>
    {% endif %}

  </div>

</div>

</body>
</html>
